<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="WtT2Yftdg5NxG7V47F_LAsB09X_0q2wPofY7bT5XUqI" />
    <title>NextGen PDF - 100% Secure, Free & Premium Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Hind', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617); }
        .logo-font { font-family: 'Rajdhani', sans-serif; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-indigo-500 selection:text-white">
    <header class="border-b-2 border-slate-800 bg-slate-950/90 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg shadow-indigo-950/40">
        <div class="flex items-center gap-2 text-2xl tracking-wider logo-font">
            <span class="bg-gradient-to-r from-amber-500 via-rose-500 to-indigo-600 text-white px-4 py-1 rounded-xl shadow-md font-bold uppercase">NextGen</span>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 font-extrabold">PDF</span>
        </div>
        <div class="text-xs md:text-sm font-bold text-emerald-400 bg-emerald-950/60 px-4 py-2 rounded-full border-2 border-emerald-500 flex items-center gap-2 shadow-sm shadow-emerald-500/20">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-ping"></span>
            100% Private: Local Processing
        </div>
    </header>
    <main class="max-w-6xl mx-auto p-6 md:p-12 flex-1 w-full">
        <div id="dashboard-view">
            <div class="text-center mb-16">
                <span class="text-xs font-bold tracking-widest text-indigo-400 uppercase bg-indigo-950/80 px-4 py-1.5 rounded-full border border-indigo-800">No Ads | No Logins | Lifetime Free</span>
                <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-slate-400 mt-4 leading-tight">Zero-Server PDF Workspace</h1>
                <p class="mt-4 text-base md:text-lg text-slate-300 max-w-2xl mx-auto font-medium">Process files locally inside your browser memory with top-tier encryption standards.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <button onclick="openTool('merge', 'Merge PDF Documents', 'Combine files.')" class="group text-left p-6 bg-gradient-to-br from-slate-900 to-slate-950 border-2 border-indigo-900/50 rounded-2xl hover:border-indigo-500 hover:shadow-xl transition-all cursor-pointer">
                    <div>
                        <div class="p-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl inline-block">📂</div>
                        <h3 class="font-bold text-xl mt-5 text-white">Merge PDF</h3>
                    </div>
                </button>
                <button onclick="openTool('compress', 'Compress PDF Size', 'Optimize weight.')" class="group text-left p-6 bg-gradient-to-br from-slate-900 to-slate-950 border-2 border-cyan-900/50 rounded-2xl hover:border-cyan-500 hover:shadow-xl transition-all cursor-pointer">
                    <div>
                        <div class="p-3.5 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl inline-block">🗜️</div>
                        <h3 class="font-bold text-xl mt-5 text-white">Compress PDF</h3>
                    </div>
                </button>
            </div>
        </div>
        <div id="tool-view" class="hidden bg-slate-950 border-2 border-slate-800 rounded-3xl p-6 md:p-10 shadow-2xl">
            <button onclick="backToDashboard()" class="text-sm font-bold text-indigo-400 mb-6 cursor-pointer bg-indigo-950/40 px-4 py-2 rounded-xl">← Back</button>
            <h2 id="tool-title" class="text-3xl font-black text-white mb-2">Title</h2>
            <p id="tool-desc" class="text-base text-slate-400 mb-8">Description</p>
        </div>
    </main>
    <footer class="border-t border-slate-800 bg-slate-950 text-center py-5 text-sm font-semibold text-slate-500">&copy; 2026 NextGen PDF. Privacy-First.</footer>
    <script>
        let currentTool = ''; let selectedFiles = [];
        function openTool(id, title, desc) { currentTool = id; document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById('tool-view').classList.remove('hidden'); document.getElementById('tool-title').innerText = title; document.getElementById('tool-desc').innerText = desc; }
        function backToDashboard() { document.getElementById('tool-view').classList.add('hidden'); document.getElementById('dashboard-view').classList.remove('hidden'); }
    </script>
</body>
</html>
